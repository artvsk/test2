<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TerraRush Quiz — география на максималках</title>
  <style>
    :root {
      --bg1: #090a1e;
      --bg2: #12152f;
      --card: rgba(18, 24, 50, 0.78);
      --card-strong: rgba(24, 31, 64, 0.95);
      --text: #eaf1ff;
      --muted: #a9b9d9;
      --accent: #7a5cff;
      --accent-2: #26d8ff;
      --ok: #2be38f;
      --bad: #ff5a82;
      --border: rgba(154, 180, 255, 0.22);
      --glow: 0 0 0 1px rgba(126, 199, 255, 0.16), 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #1e2759 0%, transparent 35%),
        radial-gradient(circle at 85% 15%, #2a1761 0%, transparent 30%),
        linear-gradient(150deg, var(--bg1) 0%, var(--bg2) 55%, #0d122b 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 30px 16px 42px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: var(--glow);
      padding: 20px;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: clamp(1.9rem, 3vw, 2.7rem);
      letter-spacing: 0.03em;
      text-shadow: 0 0 30px rgba(122, 92, 255, 0.4);
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      text-align: center;
    }

    select, button, input[type="text"] {
      font: inherit;
      border-radius: 12px;
      border: 1px solid rgba(166, 188, 255, 0.32);
      padding: 10px 12px;
      color: var(--text);
      background: rgba(12, 18, 40, 0.85);
      width: 100%;
    }

    input[type="text"]::placeholder { color: #8ea4ca; }

    .home {
      display: grid;
      gap: 12px;
      max-width: 560px;
      margin: 0 auto;
    }

    button {
      border: none;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .ghost {
      background: rgba(138, 160, 255, 0.16);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .quiz-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    .question {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card-strong);
      padding: 12px;
      margin-bottom: 10px;
    }

    .question p {
      margin: 0 0 8px;
      font-weight: 600;
      line-height: 1.35;
    }

    .answers {
      display: grid;
      gap: 7px;
    }

    .option {
      border: 1px solid rgba(146, 171, 255, 0.3);
      border-radius: 11px;
      padding: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(20, 27, 57, 0.72);
    }

    .status {
      margin-top: 12px;
      min-height: 1.3em;
      font-weight: 800;
    }

    .correct-answer {
      margin: 9px 0 0;
      color: #9ec7ff;
      font-size: 0.93rem;
      font-weight: 600;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TerraRush Quiz 🚀</h1>
    <p class="subtitle">Выбирай материк, отвечай на 10 вопросов и прокачивай географию.</p>

    <section id="home-screen" class="card">
      <div class="home">
        <label for="continent-select">Какой материк выбираем сегодня?</label>
        <select id="continent-select"></select>
        <button id="start-btn">Поехали! 10 вопросов</button>
      </div>
    </section>

    <section id="quiz-screen" class="card hidden">
      <div class="quiz-head">
        <strong id="quiz-title"></strong>
        <button id="back-btn" class="ghost" style="width:auto;">Выбрать другой материк</button>
      </div>
      <div id="question-list"></div>
      <button id="check-btn">Проверить и показать результат</button>
      <p id="quiz-status" class="status"></p>
    </section>
  </div>

  <script>
    const questionBank = {
      "Европа": [
        { type: "single", text: "Какой климат характерен для большей части Западной Европы?", options: ["Муссонный", "Умеренно-морской", "Экваториальный"], correct: "Умеренно-морской" },
        { type: "single", text: "Какие горы отделяют Европу от Азии на востоке?", options: ["Уральские", "Анды", "Атлас"], correct: "Уральские" },
        { type: "text", text: "Назовите самую длинную реку Европы.", correct: ["волга"] },
        { type: "single", text: "Какая страна Европы известна фьордами?", options: ["Норвегия", "Испания", "Чехия"], correct: "Норвегия" },
        { type: "single", text: "Какой полезный ресурс широко добывается в Северном море?", options: ["Нефть", "Уран", "Алмазы"], correct: "Нефть" },
        { type: "text", text: "Назовите страну Европы с одной из самых высоких плотностей населения.", correct: ["нидерланды", "бельгия", "мальта"] },
        { type: "single", text: "Какая природная зона типична для севера Европы?", options: ["Тайга", "Саванна", "Влажные экваториальные леса"], correct: "Тайга" },
        { type: "single", text: "Какой город находится на реке Темзе?", options: ["Лондон", "Берлин", "Вена"], correct: "Лондон" },
        { type: "text", text: "Как называется климат южного побережья Европы (Испания, Италия, Греция)?", correct: ["средиземноморский"] },
        { type: "single", text: "Какие горы расположены между Францией и Испанией?", options: ["Пиренеи", "Карпаты", "Кавказ"], correct: "Пиренеи" }
      ],
      "Азия": [
        { type: "single", text: "Какой тип климата преобладает в Юго-Восточной Азии?", options: ["Муссонный", "Арктический", "Морской"], correct: "Муссонный" },
        { type: "single", text: "Какая высочайшая горная система мира находится в Азии?", options: ["Альпы", "Гималаи", "Аппалачи"], correct: "Гималаи" },
        { type: "text", text: "Назовите самую высокую вершину мира.", correct: ["эверест", "джомолунгма"] },
        { type: "single", text: "Какая крупная река протекает в Китае?", options: ["Янцзы", "Нил", "Дунай"], correct: "Янцзы" },
        { type: "single", text: "Какой ресурс особенно важен для стран Персидского залива?", options: ["Нефть", "Лес", "Торф"], correct: "Нефть" },
        { type: "text", text: "Назовите крупнейший по населению регион Азии: Южная, Восточная или Северная?", correct: ["южная", "восточная"] },
        { type: "single", text: "Какая пустыня находится в Монголии и Китае?", options: ["Гоби", "Сахара", "Атакама"], correct: "Гоби" },
        { type: "single", text: "Какой пояс характерен для крайнего севера Сибири?", options: ["Арктический", "Субэкваториальный", "Тропический"], correct: "Арктический" },
        { type: "text", text: "Какая страна занимает большую часть Индостанского полуострова?", correct: ["индия"] },
        { type: "single", text: "Какое море омывает Японию с запада?", options: ["Японское", "Аравийское", "Карибское"], correct: "Японское" }
      ],
      "Африка": [
        { type: "single", text: "Какая пустыня является крупнейшей жаркой пустыней мира?", options: ["Гоби", "Сахара", "Калахари"], correct: "Сахара" },
        { type: "single", text: "Какая река считается самой длинной в Африке?", options: ["Конго", "Нил", "Нигер"], correct: "Нил" },
        { type: "text", text: "Какой климат преобладает в центральной части Африки около экватора?", correct: ["экваториальный"] },
        { type: "single", text: "Какая страна известна крупной добычей алмазов?", options: ["Ботсвана", "Португалия", "Таиланд"], correct: "Ботсвана" },
        { type: "single", text: "Какая природная зона занимает большие площади к югу от Сахары?", options: ["Саванна", "Тундра", "Тайга"], correct: "Саванна" },
        { type: "text", text: "Назовите самое большое по площади озеро Африки (по поверхности).", correct: ["виктория", "озеро виктория"] },
        { type: "single", text: "Какие горы находятся на северо-западе Африки?", options: ["Атлас", "Урал", "Анды"], correct: "Атлас" },
        { type: "single", text: "В какой части Африки население размещено наиболее неравномерно?", options: ["В районах пустынь", "На побережьях и в долинах рек", "Оба варианта верны"], correct: "Оба варианта верны" },
        { type: "text", text: "Назовите остров у восточного побережья Африки, один из крупнейших в мире.", correct: ["мадагаскар"] },
        { type: "single", text: "Какой океан омывает восточное побережье Африки?", options: ["Индийский", "Северный Ледовитый", "Тихий"], correct: "Индийский" }
      ],
      "Северная Америка": [
        { type: "single", text: "Какая горная система проходит вдоль западной части материка?", options: ["Кордильеры", "Аппенины", "Альпы"], correct: "Кордильеры" },
        { type: "single", text: "Какой климатический пояс характерен для крайнего севера Канады?", options: ["Арктический", "Тропический", "Субэкваториальный"], correct: "Арктический" },
        { type: "text", text: "Назовите одну из Великих озёр.", correct: ["верхнее", "мичиган", "гурон", "эри", "онтарио"] },
        { type: "single", text: "Какая река является одной из главных водных артерий США?", options: ["Миссисипи", "Амур", "Рейн"], correct: "Миссисипи" },
        { type: "single", text: "Какой природный ресурс играет важную роль в экономике Канады?", options: ["Лес", "Оливки", "Рис"], correct: "Лес" },
        { type: "text", text: "Как называется тёплое течение у восточного побережья США?", correct: ["гольфстрим"] },
        { type: "single", text: "Где плотность населения в Северной Америке выше всего?", options: ["Север Канады", "Побережья и крупные города", "Горные районы Аляски"], correct: "Побережья и крупные города" },
        { type: "single", text: "Какая страна занимает большую часть материка по площади?", options: ["США", "Канада", "Мексика"], correct: "Канада" },
        { type: "text", text: "Как называется узкий перешеек, соединяющий Северную и Южную Америку?", correct: ["панамский", "панамский перешеек"] },
        { type: "single", text: "Какой океан омывает западное побережье Северной Америки?", options: ["Тихий", "Индийский", "Атлантический"], correct: "Тихий" }
      ],
      "Южная Америка": [
        { type: "single", text: "Какая горная система тянется вдоль западного побережья материка?", options: ["Анды", "Кордильеры", "Карпаты"], correct: "Анды" },
        { type: "single", text: "Какая река является самой полноводной в мире?", options: ["Амазонка", "Нил", "Лена"], correct: "Амазонка" },
        { type: "text", text: "Как называется влажная экваториальная природная зона Амазонии?", correct: ["сельва", "влажные экваториальные леса"] },
        { type: "single", text: "Какой климат преобладает в бассейне Амазонки?", options: ["Экваториальный", "Арктический", "Средиземноморский"], correct: "Экваториальный" },
        { type: "single", text: "Какая страна крупнейшая по площади в Южной Америке?", options: ["Аргентина", "Бразилия", "Перу"], correct: "Бразилия" },
        { type: "text", text: "Назовите пустыню на тихоокеанском побережье Чили.", correct: ["атакама", "пустыня атакама"] },
        { type: "single", text: "Какой ресурс важен для Чили?", options: ["Медь", "Уголь", "Никель"], correct: "Медь" },
        { type: "single", text: "Где плотность населения обычно выше?", options: ["В Андах и мегаполисах", "В центральной Амазонии", "В Патагонии"], correct: "В Андах и мегаполисах" },
        { type: "text", text: "Как называется плато в центральной части Бразилии?", correct: ["бразильское плоскогорье", "бразильское"] },
        { type: "single", text: "Какой океан омывает восточное побережье Южной Америки?", options: ["Атлантический", "Северный Ледовитый", "Индийский"], correct: "Атлантический" }
      ],
      "Австралия": [
        { type: "single", text: "Какая природная зона занимает большую часть центра Австралии?", options: ["Пустыни и полупустыни", "Тайга", "Тундра"], correct: "Пустыни и полупустыни" },
        { type: "single", text: "Как называется крупнейший коралловый риф у северо-восточного побережья?", options: ["Большой Барьерный риф", "Белизский риф", "Мезоамериканский риф"], correct: "Большой Барьерный риф" },
        { type: "text", text: "Назовите столицу Австралии.", correct: ["канберра"] },
        { type: "single", text: "Какой климат преобладает во внутренних районах материка?", options: ["Засушливый", "Экваториальный", "Субарктический"], correct: "Засушливый" },
        { type: "single", text: "Какие полезные ископаемые особенно важны для Австралии?", options: ["Железная руда и уголь", "Нефть и газ только", "Алмазы только"], correct: "Железная руда и уголь" },
        { type: "text", text: "Как называется горная система на востоке Австралии?", correct: ["большой водораздельный хребет", "водораздельный хребет"] },
        { type: "single", text: "Где сосредоточено больше населения Австралии?", options: ["На побережье", "В центральных пустынях", "В высокогорьях"], correct: "На побережье" },
        { type: "single", text: "Какой океан омывает западное побережье Австралии?", options: ["Индийский", "Атлантический", "Северный Ледовитый"], correct: "Индийский" },
        { type: "text", text: "Назовите самый крупный остров к югу от материковой Австралии.", correct: ["тасмания"] },
        { type: "single", text: "Какая страна полностью расположена на материке Австралия?", options: ["Австралия", "Новая Зеландия", "Папуа — Новая Гвинея"], correct: "Австралия" }
      ],
      "Антарктида": [
        { type: "single", text: "Какой климат характерен для Антарктиды?", options: ["Тропический", "Полярный", "Умеренный"], correct: "Полярный" },
        { type: "single", text: "Как называется крупнейший ледниковый щит Антарктиды?", options: ["Антарктический ледниковый щит", "Гренландский щит", "Скандинавский щит"], correct: "Антарктический ледниковый щит" },
        { type: "text", text: "Как называется океан, окружающий Антарктиду?", correct: ["южный", "южный океан"] },
        { type: "single", text: "Какой тип постоянного населения у Антарктиды?", options: ["Много постоянных городов", "Постоянного населения нет", "Только сельское население"], correct: "Постоянного населения нет" },
        { type: "single", text: "Кто работает на материке в основном?", options: ["Только туристы", "Учёные и персонал станций", "Шахтёры"], correct: "Учёные и персонал станций" },
        { type: "text", text: "Как называется крупнейший полуостров Антарктиды, направленный к Южной Америке?", correct: ["антарктический полуостров"] },
        { type: "single", text: "Какой ресурс Антарктиды важен для всего мира?", options: ["Запасы пресной воды в льде", "Тропические леса", "Пахотные земли"], correct: "Запасы пресной воды в льде" },
        { type: "single", text: "Какой полюс расположен в Антарктиде?", options: ["Северный", "Южный", "Магнитный экватор"], correct: "Южный" },
        { type: "text", text: "Какие животные особенно ассоциируются с Антарктидой?", correct: ["пингвины", "пингвин"] },
        { type: "single", text: "Какой международный документ регулирует мирное использование материка?", options: ["Договор об Антарктике", "Парижское соглашение", "Киотский протокол"], correct: "Договор об Антарктике" }
      ]
    };

    const continentSelect = document.getElementById("continent-select");
    const startBtn = document.getElementById("start-btn");
    const backBtn = document.getElementById("back-btn");
    const checkBtn = document.getElementById("check-btn");
    const homeScreen = document.getElementById("home-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const questionList = document.getElementById("question-list");
    const quizTitle = document.getElementById("quiz-title");
    const quizStatus = document.getElementById("quiz-status");

    let currentQuestions = [];

    function fillContinents() {
      continentSelect.innerHTML = "";
      Object.keys(questionBank).forEach(continent => {
        const option = document.createElement("option");
        option.value = continent;
        option.textContent = continent;
        continentSelect.appendChild(option);
      });
    }

    function renderQuestions(continent) {
      currentQuestions = questionBank[continent].slice(0, 10);
      questionList.innerHTML = "";
      quizStatus.textContent = "";
      quizTitle.textContent = `Материк: ${continent} — 10 вопросов`;

      currentQuestions.forEach((q, index) => {
        const card = document.createElement("div");
        card.className = "question";
        card.dataset.type = q.type;
        card.dataset.correct = JSON.stringify(q.correct);

        const title = document.createElement("p");
        title.textContent = `${index + 1}. ${q.text}`;
        card.appendChild(title);

        if (q.type === "single") {
          const answers = document.createElement("div");
          answers.className = "answers";

          q.options.forEach(optionText => {
            const label = document.createElement("label");
            label.className = "option";
            const radio = document.createElement("input");
            radio.type = "radio";
            radio.name = `q-${index}`;
            radio.value = optionText;
            label.append(radio, document.createTextNode(optionText));
            answers.appendChild(label);
          });

          card.appendChild(answers);
        } else {
          const input = document.createElement("input");
          input.type = "text";
          input.placeholder = "Введите ответ";
          input.dataset.role = "text";
          card.appendChild(input);
        }

        const correctText = document.createElement("p");
        correctText.className = "correct-answer hidden";
        card.appendChild(correctText);

        questionList.appendChild(card);
      });
    }

    function normalize(value) {
      return value.trim().toLowerCase().replace(/ё/g, "е");
    }

    startBtn.addEventListener("click", () => {
      const continent = continentSelect.value;
      renderQuestions(continent);
      homeScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
    });

    backBtn.addEventListener("click", () => {
      quizScreen.classList.add("hidden");
      homeScreen.classList.remove("hidden");
      quizStatus.textContent = "";
    });

    checkBtn.addEventListener("click", () => {
      const cards = questionList.querySelectorAll(".question");
      let correctCount = 0;

      cards.forEach(card => {
        const type = card.dataset.type;
        const correct = JSON.parse(card.dataset.correct);
        let isCorrect = false;

        if (type === "single") {
          const picked = card.querySelector("input[type='radio']:checked");
          isCorrect = Boolean(picked && picked.value === correct);
        } else {
          const userValue = normalize(card.querySelector("input[data-role='text']").value);
          const valid = Array.isArray(correct) ? correct.map(normalize) : [normalize(correct)];
          isCorrect = valid.includes(userValue);
        }

        const rightAnswers = Array.isArray(correct) ? correct : [correct];
        const answerText = card.querySelector(".correct-answer");
        answerText.textContent = `Правильный ответ: ${rightAnswers.join(" / ")}`;
        answerText.classList.remove("hidden");

        card.style.borderColor = isCorrect ? "#2e9d69" : "#d35454";
        if (isCorrect) correctCount += 1;
      });

      quizStatus.className = `status ${correctCount === cards.length ? "ok" : "bad"}`;
      quizStatus.textContent = `Результат: ${correctCount}/${cards.length}`;
    });

    fillContinents();
  </script>
</body>
</html>
